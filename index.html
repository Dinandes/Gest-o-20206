const PDF_TEXTO = `QUESTIONÁRIO DE GESTÃO 2026

1. Quais são os principais componentes de um processo de qualidade na visão de JURAN?
R: Planejamento da qualidade, controle da qualidade e aperfeiçoamento da qualidade.

2. Quais são as eras da qualidade?
R: Era da inspeção, era do controle estatístico da qualidade, era da garantia da qualidade e era da gestão da qualidade total.

3. Explique a Era da Inspeção.
R: Apoia-se em um sistema de medidas, utilizando-se de gabaritos e outros acessórios e de um padrão de referência.

4. Cite os fatores higiênicos segundo HERZBERG.
R: Salário, segurança, condições ambientais, bem-estar físico, supervisão e aceitação grupal.

5. Cite os fatores motivacionais segundo HERZBERG.
R: Ascensão funcional, trabalho em si, reconhecimento e responsabilidade, liberdade e confiança, desafios profissionais, maior responsabilidade e estímulo a criatividade.

6. Qual a definição oficial de Qualidade?
R: A Qualidade é o conjunto das propriedades e características de um produto, processo ou serviço, que lhe fornecem a capacidade de satisfazer as necessidades explícitas ou implícitas.

7. O que é qualidade total?
R: É o processo utilizado para garantir o atendimento às necessidades e expectativas dos clientes.

8. O que é custo da qualidade?
R: É a expressão usada para indicar dinheiro gasto para prevenir, avaliar e corrigir problemas, desperdícios e falhas de serviços e produtos.

9. O que é processo?
R: É um conjunto de causas ou fatores que agindo entre si, promovem a transformação da Matéria-prima ou lhe agregam valor, produzindo um resultado ou efeito desejado.

10. Como os processos podem ser classificados?
R: Os processos podem ser classificados como repetitivos e não repetitivos.

11. Quais são as fases básicas do ciclo PDCA?
R: Planejar, executar, verificar e agir.

12. O que são indicadores de desempenho?
R: São grandezas numéricas que medem atributos de um processo ou de seus resultados, com o objetivo de comparar essas medidas com metas numéricas preestabelecidas.

13. O que é o programa 5S?
R: É um programa de reeducação contra o desperdício.

14. O termo 5S é derivado de cinco palavras em japonês, todas iniciadas com a letra S. Cite cada uma delas e suas atribuições.
R: SEIRI- Seleção, utilização, arrumação e organização;
   SEITON- Ordenação, sistematização e classificação;
   SEISOU- Limpeza e zelo;
   SEIKETSU- Bem-estar, higiene, asseio, saúde e integridade;
   SHITSUKE- Autodisciplina, educação e compromisso.

15. Cite os benefícios do programa 5S.
R: Otimização dos espaços, minimização de excessos, consciência dos desperdícios, melhor aproveitamento do tempo e consciência da importância do controle.

16. O que é Brainstorming?
R: É uma dinâmica de grupo em que as pessoas, de forma organizada e com oportunidades iguais, fazem um grande esforço mental para opinar sobre determinado assunto.

17. O que é equipe?
R: Grupo de pessoas que trabalham juntos com sinergia, com competência e habilidades que se complementam para atingir um objetivo comum.

18. O que é comunicação?
R: É a transmissão de qualquer tipo de informação, por qualquer via ou processo.

19. O que é mensagem?
R: É o conteúdo ou assunto das informações que são transmitidas.

20. O que é canal de comunicação?
R: É o meio pelo qual a mensagem é transmitida.

21. O que é o programa Netuno?
R: É um processo administrativo destinado a aprimorar a gestão das Organizações Militares e, consequentemente, proporcionar à Marinha do Brasil as melhores condições para estar pronta e adequada à estatura político estratégica exigida pelo país.

22. A Marinha do Brasil possui em sua estrutura sete órgãos de Direção Setorial. Cite-os.
R: Comando de Operações Navais (ComOpNav), Secretaria Geral da Marinha (SGM), Diretoria Geral do Material da Marinha (DGMM), Diretoria Geral do Pessoal da Marinha (DGPM), Diretoria Geral de Navegação (DGN), Diretoria Geral de Desenvolvimento Nuclear e Tecnológico da Marinha (DGDNTM) e o Comando Geral do Corpo de Fuzileiros Navais (CGCFN).`;

function embaralhar(n) {
  const arr = Array.from({length: n}, (_, i) => i);
  for (let i = n - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function Flashcards() {
  const [poolIdx, setPoolIdx] = useState(() => FLASHCARDS_DATA.map((_, i) => i));
  const [pos, setPos]         = useState(0);
  const [virado, setVirado]   = useState(false);
  const [acertos, setAcertos] = useState(0);
  const [erradosIdx, setErrados] = useState([]);
  const [done, setDone]       = useState(false);

  const tot = poolIdx.length;

  const reiniciar = () => {
    setPoolIdx(FLASHCARDS_DATA.map((_, i) => i));
    setPos(0); setVirado(false); setAcertos(0); setErrados([]); setDone(false);
  };

  const refazerErrados = () => {
    if (erradosIdx.length === 0) return;
    setPoolIdx([...erradosIdx]);
    setPos(0); setVirado(false); setAcertos(0); setErrados([]); setDone(false);
  };

  const responder = (soube) => {
    const novoErrado = soube ? erradosIdx : [...erradosIdx, poolIdx[pos]];
    if (!soube) setErrados(novoErrado);
    else setAcertos(a => a + 1);
    if (pos + 1 >= tot) {
      setErrados(novoErrado);
      setDone(true);
    } else {
      setPos(p => p + 1);
      setVirado(false);
    }
  };

  if (done) return (
    <Wrap>
      <div style={{textAlign:"center",background:COR.card,border:`2px solid ${COR.gold}`,borderRadius:"12px",padding:"28px"}}>
        <div style={{fontSize:"20px",color:COR.gold,marginBottom:"12px"}}>🃏 Flashcards Concluídos!</div>
        <div style={{fontSize:"15px",color:COR.green,marginBottom:"4px"}}>✅ Soube: {acertos}</div>
        <div style={{fontSize:"15px",color:COR.red,marginBottom:"16px"}}>❌ Não soube: {erradosIdx.length}</div>
        <div style={{display:"flex",gap:"8px",justifyContent:"center",flexWrap:"wrap"}}>
          <button style={sBtnS} onClick={reiniciar}>↺ Refazer todos</button>
          {erradosIdx.length > 0 && (
            <button style={sBtnR} onClick={refazerErrados}>🔁 Só os que não soube ({erradosIdx.length})</button>
          )}
        </div>
      </div>
    </Wrap>
  );

  const card = FLASHCARDS_DATA[poolIdx[pos]];

  return (
    <Wrap>
      <div style={{background:"#0d1a2e",borderRadius:"6px",padding:"7px 12px",marginBottom:"10px",border:`1px solid ${COR.brd}`,display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:"11px",color:"#7fb3c8"}}>
        <span>🃏 Flashcards</span>
        <div style={{display:"flex",gap:"12px",alignItems:"center"}}>
          <span style={{color:COR.green}}>✅ {acertos}</span>
          <span style={{color:COR.red}}>❌ {erradosIdx.length}</span>
          <span style={{color:COR.accent,fontWeight:"bold",fontSize:"14px"}}>{pos + 1} / {tot}</span>
          <button onClick={reiniciar} style={{background:"transparent",border:`1px solid ${COR.brd}`,color:"#7fb3c8",padding:"2px 8px",borderRadius:"4px",cursor:"pointer",fontSize:"10px"}}>↺</button>
        </div>
      </div>

      <div style={{background:"#0d1a2e",borderRadius:"6px",height:"6px",overflow:"hidden",border:`1px solid ${COR.brd}`,marginBottom:"14px"}}>
        <div style={{background:COR.accent,height:"100%",width:`${((pos+1)/tot)*100}%`,transition:"width .3s"}}/>
      </div>

      <div onClick={() => setVirado(v => !v)} style={{
        background:virado?`${COR.green}15`:COR.card,
        border:`2px solid ${virado?COR.green:COR.accent}`,
        borderRadius:"12px",padding:"28px 20px",minHeight:"160px",
        cursor:"pointer",display:"flex",flexDirection:"column",
        alignItems:"center",justifyContent:"center",textAlign:"center",
        marginBottom:"14px",transition:"all .2s"
      }}>
        <div style={{fontSize:"10px",color:virado?COR.green:COR.accent,marginBottom:"10px",letterSpacing:"1px",fontWeight:"bold"}}>

// ─── MÚLTIPLA ESCOLHA ─────────────────────────────────────────────────────────
// ABORDAGEM FINAL: estado fora do React (variável de módulo).
// Isso torna IMPOSSÍVEL qualquer reset por remount, StrictMode, batching ou
// reconciliação do React — o estado existe no módulo JS, não na árvore React.

let _mq = null; // estado global do quiz, fora do React

function _mqReset(pool) {
  _mq = {
    pool:    pool ? pool.slice() : MULTI_DATA.slice(),
    pos:     0,
    sel:     null,   // índice selecionado
    conf:    false,  // confirmado
    acertos: 0,
    erradas: [],
    fim:     false
  };
}

function MultiplaEscolha() {
  // tick serve APENAS para forçar re-render — o estado real está em _mq
  const [tick, setTick] = useState(0);
  const re = () => setTick(t => t + 1);

  // Inicializa na primeira vez (ou se _mq foi zerado)
  if (!_mq) _mqReset();
  const st = _mq;

  if (st.fim) {
    const erradasPool = st.erradas.map(i => st.pool[i]);
    const acertos     = st.acertos;
    const total       = st.pool.length;
    const erradas     = st.erradas.slice();
    return (
      <ScoreBox
        score={acertos}
        total={total}
        erradas={erradas}
        onReset={() => { _mqReset(); re(); }}
        onErradas={erradas.length > 0
          ? () => { _mqReset(erradasPool); re(); }
          : null}
      />
    );
  }

  const q   = st.pool[st.pos];
  const tot = st.pool.length;

  // Ações — mutam _mq e forçam re-render
  const selecionar = (i) => {
    if (st.conf) return;
    st.sel = i;
    re();
  };

  const confirmar = () => {
    if (st.sel === null || st.conf) return;
    st.conf = true;
    if (st.sel === q.correta) st.acertos += 1;
    else st.erradas = [...st.erradas, st.pos];
    re();
  };

  const proxima = () => {
    if (st.pos + 1 >= tot) st.fim = true;
    else {
      st.pos  += 1;
      st.sel   = null;
      st.conf  = false;
    }
    re();
  };

  // Estilos dos botões — calculados antes do JSX
  const estilo = (i) => {
    if (st.conf) {
      if (i === q.correta) return { bg:`${COR.green}20`, brd:COR.green,  col:COR.green  };
      if (i === st.sel)    return { bg:`${COR.red}20`,   brd:COR.red,    col:COR.red    };
    }
    if (st.sel === i)      return { bg:`${COR.accent}15`,brd:COR.accent, col:COR.accent };
    return { bg:"#0d1a2e", brd:COR.brd, col:"#c8dce8" };
  };

  const s0=estilo(0), s1=estilo(1), s2=estilo(2), s3=estilo(3);

  const corFb  = st.conf && st.sel === q.correta ? COR.green : COR.red;
  const txtFb  = st.conf
    ? (st.sel === q.correta ? "✅ Correto! " : "❌ Errado! ") + q.explicacao
    : "\u00A0";

  const btnStyle = (s) => ({
    display:"block", width:"100%", textAlign:"left",
    padding:"10px 12px", margin:"5px 0", borderRadius:"6px",
    border:`1px solid ${s.brd}`, background:s.bg, color:s.col,
    cursor: st.conf ? "default":"pointer", fontSize:"12px"
  });

  return (
    <Wrap>
      <ProgBar cur={st.pos} tot={tot} lbl="Múltipla Escolha"
        onRestart={() => { _mqReset(); re(); }}/>
      <div style={sCard}>
        <div style={{background:`${COR.gold}15`,border:`1px solid ${COR.gold}30`,
          borderRadius:"6px",padding:"5px 12px",marginBottom:"10px",
          fontSize:"11px",color:COR.gold}}>
          Questão {st.pos+1} de {tot}
        </div>

        <div style={sQTxt}>{q.pergunta}</div>

        {/* 4 botões fixos — sem .map, sem key dinâmico, sem componente inline */}
        <button style={btnStyle(s0)} onClick={() => selecionar(0)}>
          <strong>A)</strong> {q.alternativas[0]}
        </button>
        <button style={btnStyle(s1)} onClick={() => selecionar(1)}>
          <strong>B)</strong> {q.alternativas[1]}
        </button>
        <button style={btnStyle(s2)} onClick={() => selecionar(2)}>
          <strong>C)</strong> {q.alternativas[2]}
        </button>
        <button style={btnStyle(s3)} onClick={() => selecionar(3)}>
          <strong>D)</strong> {q.alternativas[3]}
        </button>

        <button onClick={confirmar} style={{...sBtnP, background:COR.gold, color:"#000",
          display: st.sel !== null && !st.conf ? "inline-block" : "none"}}>
          ✔ Confirmar Resposta
        </button>

        <div style={{display: st.conf ? "block":"none",
          background:`${corFb}12`, border:`1px solid ${corFb}`,
          borderRadius:"6px", padding:"10px", marginTop:"8px",
          fontSize:"12px", color:corFb, lineHeight:"1.6"}}>
          {txtFb}
        </div>

        <button onClick={proxima} style={{...sBtnP,
          display: st.conf ? "inline-block":"none"}}>
          {st.pos + 1 < tot ? "Próxima Questão →" : "Ver Resultado"}
        </button>
      </div>
    </Wrap>
  );
}

  const [just, setJust]       = useState("");
  const [subjust, setSubjust] = useState("");

  const reiniciar = (novoPool) => {
    setPool(novoPool || TF_DATA);
    setIdx(0); setSel(null); setShow(false);
    setScore(0); setErradas([]); setDone(false);
    setJust(""); setSubjust("");
  };

  if (done) return (
    <ScoreBox score={score} total={pool.length} erradas={erradas}
      onReset={() => reiniciar(TF_DATA)}
      onErradas={erradas.length > 0 ? () => reiniciar(erradas.map(i => pool[i])) : null}/>
  );

  const q = pool[idx];

  const estiloBotaoTF = (val) => {
    let border = COR.brd, bg = "#0d1a2e", color = "#7fb3c8";
    if (show) {
      if (q.answer === val)  { border=COR.green; bg=`${COR.green}20`; color=COR.green; }
      else if (sel === val)  { border=COR.red;   bg=`${COR.red}20`;   color=COR.red;   }
    } else if (sel === val)  { border=COR.accent; bg=`${COR.accent}15`; color=COR.accent; }
    return {padding:"12px 22px",borderRadius:"6px",border:`2px solid ${border}`,background:bg,color,cursor:"pointer",fontSize:"13px",fontWeight:"bold",margin:"0 5px"};
  };

  const confirmar = (val) => {
    const ok = val === q.answer;
    if (ok) setScore(s => s + 1);
    else setErradas(e => [...e, idx]);
    setSubjust(just); setJust(""); setShow(true);
  };

  const proxima = () => {
    if (idx + 1 >= pool.length) setDone(true);
    else { setIdx(i => i+1); setSel(null); setShow(false); setJust(""); setSubjust(""); }
  };

  return (
    <Wrap>
      <ProgBar cur={idx} tot={pool.length} lbl="Certo ou Errado" onRestart={() => reiniciar(TF_DATA)}/>
      <div style={sCard}>
        <div style={sQTxt}>{q.q}</div>
        <div style={{display:"flex",gap:"8px",justifyContent:"center",margin:"12px 0"}}>
          <button style={estiloBotaoTF(true)}  onClick={() => { if(show||sel!==null)return; setSel(true);  confirmar(true);  }}>✅ CERTO</button>
          <button style={estiloBotaoTF(false)} onClick={() => { if(show||sel!==null)return; setSel(false); }}>❌ ERRADO</button>
        </div>
        {sel===false && !show && (
          <div style={{marginTop:"8px",padding:"10px",background:`${COR.red}10`,border:`1px solid ${COR.red}40`,borderRadius:"6px"}}>
            <div style={{fontSize:"12px",color:"#ffaaaa",marginBottom:"6px"}}>📝 Justifique por que a afirmação está errada:</div>
            <textarea style={{...sInp,minHeight:"65px"}} placeholder="Escreva sua justificativa..." value={just} onChange={e => setJust(e.target.value)}/>
            <button style={{...sBtnP,background:COR.red,color:"#fff"}} onClick={() => confirmar(false)}>OK — Confirmar e Ver Gabarito</button>
          </div>
        )}
        {show && (
          <div style={{background:sel===q.answer?`${COR.green}12`:`${COR.red}12`,border:`1px solid ${sel===q.answer?COR.green:COR.red}`,borderRadius:"6px",padding:"10px",marginTop:"8px",fontSize:"12px",color:sel===q.answer?COR.green:"#ffaaaa",lineHeight:"1.6"}}>
            <strong>{q.just}</strong>
            {sel===false && subjust && <div style={{marginTop:"6px",padding:"6px",background:"#ffffff0a",borderRadius:"4px",fontSize:"11px",color:"#bbb"}}>📝 Sua justificativa: "{subjust}"</div>}
          </div>
        )}
        {show && <button style={sBtnP} onClick={proxima}>{idx+1<pool.length?"Próxima →":"Ver Resultado"}</button>}
      </div>
    </Wrap>
  );
}

// ─── CORRELACIONE ─────────────────────────────────────────────────────────────
// CORREÇÃO 2: gabarito sempre no DOM, visibilidade via display CSS (evita insertBefore)
// ─── CORRELACIONE — reescrito do zero com dropdowns ──────────────────────────
// A abordagem click-esquerda→click-direita causava removeChild/insertBefore
// porque o React perdia o controle da árvore ao adicionar/remover nós condicionais.
// Nova abordagem: cada termo tem um <select> — DOM completamente estável,
// zero nós condicionais, zero problemas de reconciliação.
function Correlacione() {
  const [si, setSi]       = useState(0);
  const [resp, setResp]   = useState({});  // { termIdx: posDir | "" }
  const [verif, setVerif] = useState(false);
  const [fim, setFim]     = useState(false);

  const conjunto = CORR_BASE[si];
  const pares    = conjunto.pares;
  const n        = pares.length;
  const shuf     = CORR_SHUFFLES[si];

  const resetar   = () => { setResp({}); setVerif(false); };
  const reiniciar = () => { setSi(0); resetar(); setFim(false); };

  const responder = (termIdx, valor) => {
    if (verif) return;
    setResp(prev => ({ ...prev, [termIdx]: valor }));
  };

  const tudoRespondido = pares.every((_, i) =>
    resp[i] !== undefined && resp[i] !== ""
  );

  // Verifica acerto: o dropdown do termo i escolheu a posDir P,
  // e shuf[P] === i significa que a definição nessa posição pertence ao termo i.
  const acertouTermo = (i) => {
    const posDir = resp[i];
    return posDir !== undefined && posDir !== "" && shuf[Number(posDir)] === i;
  };

  const placar = verif
    ? pares.reduce((acc, _, i) => acc + (acertouTermo(i) ? 1 : 0), 0)
    : 0;

  const proximo = () => {
    if (si + 1 >= CORR_BASE.length) setFim(true);
    else { setSi(s => s + 1); resetar(); }
  };

  if (fim) return (
    <Wrap>
      <div style={{
        textAlign:"center", background:COR.card,
        border:`2px solid ${COR.gold}`, borderRadius:"12px", padding:"28px"
      }}>
        <div style={{fontSize:"18px",color:COR.gold,marginBottom:"8px"}}>
          🎉 Todos os conjuntos concluídos!
        </div>
        <button style={sBtnS} onClick={reiniciar}>↺ Refazer tudo</button>
      </div>
    </Wrap>
  );

  return (
    <Wrap>
      {/* Cabeçalho */}
      <div style={{
        background:"#0d1a2e", borderRadius:"6px", padding:"7px 12px",
        marginBottom:"10px", fontSize:"11px", color:"#7fb3c8",
        display:"flex", justifyContent:"space-between", alignItems:"center",
        border:`1px solid ${COR.brd}`
      }}>
        <span>🔗 {conjunto.titulo}</span>
        <div style={{display:"flex", alignItems:"center", gap:"10px"}}>
          <span style={{color:COR.accent, fontWeight:"bold", fontSize:"13px"}}>
            {si + 1} / {CORR_BASE.length}
          </span>
          <button
            onClick={reiniciar}
            style={{
              background:"transparent", border:`1px solid ${COR.brd}`,
              color:"#7fb3c8", padding:"2px 8px",
              borderRadius:"4px", cursor:"pointer", fontSize:"10px"
            }}
          >↺</button>
        </div>
      </div>

      <div style={sCard}>
        <div style={{fontSize:"11px", color:"#7fb3c8", marginBottom:"14px"}}>
          Para cada termo, escolha a definição correta no menu suspenso.
        </div>

        {/* Uma linha por termo — sempre N linhas, DOM estável */}
        {pares.map((par, i) => {
          const ok  = verif && acertouTermo(i);
          const err = verif && !acertouTermo(i) && resp[i] !== undefined && resp[i] !== "";

          // Cores calculadas antes do JSX — sem ternários instáveis inline
          const corBorda = ok ? COR.green : err ? COR.red : COR.brd;
          const corFundo = ok ? `${COR.green}10` : err ? `${COR.red}10` : "#0d1a2e";
          const corTexto = ok ? COR.green : err ? COR.red : "#c8dce8";
          const badgeFundo = ok ? COR.green : err ? COR.red : "#1a2a3a";
          const badgeCor   = ok ? "#000"    : err ? "#fff"  : COR.gold;

          // Texto da correção — sempre uma string, nunca nulo
          const textoCorrecao = err ? `✓ Correto: ${par.d}` : "\u00A0";

          return (
            <div
              key={i}
              style={{
                marginBottom:"10px", padding:"10px",
                borderRadius:"8px", border:`1px solid ${corBorda}`,
                background: corFundo
              }}
            >
              {/* Linha: badge + termo */}
              <div style={{
                display:"flex", alignItems:"center", gap:"8px",
                marginBottom:"8px", fontSize:"12px",
                fontWeight:"bold", color: corTexto
              }}>
                <span style={{
                  display:"inline-flex", alignItems:"center", justifyContent:"center",
                  minWidth:"22px", height:"20px",
                  background: badgeFundo, color: badgeCor,
                  borderRadius:"3px", padding:"0 5px",
                  fontSize:"11px", fontWeight:"bold", flexShrink:0
                }}>
                  {i + 1}
                </span>
                <span>{par.e}</span>
                {/* Ícone — span sempre presente, conteúdo muda */}
                <span style={{marginLeft:"auto", fontSize:"14px"}}>
                  {ok ? "✅" : err ? "❌" : ""}
                </span>
              </div>

              {/* Dropdown de definições */}
              <select
                value={resp[i] !== undefined ? resp[i] : ""}
                onChange={e => responder(i, e.target.value)}
                disabled={verif}
                style={{
                  width:"100%", background:"#0a1628",
                  border:`1px solid ${corBorda}`,
                  borderRadius:"6px", padding:"8px 10px",
                  color: corTexto, fontSize:"11px",
                  cursor: verif ? "default" : "pointer",
                  outline:"none"
                }}
              >
                <option value="">— selecione a definição —</option>
                {shuf.map((origIdx, posDir) => (
                  <option key={posDir} value={posDir}>
                    {pares[origIdx].d}
                  </option>
                ))}
              </select>

              {/* Correção — div SEMPRE presente, visibilidade via color/height */}
              <div style={{
                fontSize:"11px",
                color: err ? "#ffaaaa" : "transparent",
                marginTop: err ? "6px" : "0px",
                height: err ? "auto" : "0px",
                overflow:"hidden",
                lineHeight:"1.5"
              }}>
                {textoCorrecao}
              </div>
            </div>
          );
        })}

        {/* Botão verificar — SEMPRE no DOM */}
        <button
          onClick={() => setVerif(true)}
          style={{
            ...sBtnP,
            display: tudoRespondido && !verif ? "inline-block" : "none"
          }}
        >
          ✅ Verificar Respostas
        </button>

        {/* Resultado + próximo — SEMPRE no DOM */}
        <div style={{ display: verif ? "block" : "none", marginTop:"12px" }}>
          <div style={{
            color: placar === n ? COR.green : "#ffaa00",
            fontWeight:"bold", fontSize:"15px", marginBottom:"10px"
          }}>
            {placar === n ? "🏆 Perfeito!" : `Acertou ${placar} / ${n}`}
          </div>
          <button style={sBtnP} onClick={proximo}>
            {si + 1 < CORR_BASE.length ? "Próximo Conjunto →" : "Finalizar"}
          </button>
        </div>
      </div>
    </Wrap>
  );
}

// ─── PDF ──────────────────────────────────────────────────────────────────────
function PDFViewer({search, onSearch}) {
  const linhas = PDF_TEXTO.split("\n");
  const termo  = search.toLowerCase().trim();
  return (
    <Wrap>
      <div style={{display:"flex",gap:"8px",alignItems:"center",marginBottom:"12px",flexWrap:"wrap"}}>
        <input type="text" placeholder="🔍 Buscar no questionário..." value={search} onChange={e=>onSearch(e.target.value)}
          style={{flex:1,minWidth:"200px",background:"#0d1a2e",border:`1px solid ${COR.accent}`,borderRadius:"6px",padding:"8px 12px",color:"#e8f4f8",fontSize:"13px",fontFamily:"Georgia,serif"}}/>
        {search && <button style={{...sBtnS,color:COR.red,borderColor:COR.red}} onClick={()=>onSearch("")}>✕</button>}
      </div>
      {search && <div style={{fontSize:"11px",color:"#7fb3c8",marginBottom:"8px"}}>{linhas.filter(l=>l.toLowerCase().includes(termo)).length} resultado(s)</div>}
      <div style={{background:COR.card,border:`1px solid ${COR.brd}`,borderRadius:"10px",padding:"20px",fontFamily:"Georgia,serif"}}>
        {linhas.map((linha,i) => {
          const match = termo && linha.toLowerCase().includes(termo);
          if (search && !match) return null;
          const isQ = /^\d+\./.test(linha.trim());
          const isR = linha.trim().startsWith("R:");
          const isTit = linha.trim() === "QUESTIONÁRIO DE GESTÃO 2026";
          let partes = [];
          if (match && termo) { const p=linha.toLowerCase().indexOf(termo); partes=[linha.slice(0,p),linha.slice(p,p+termo.length),linha.slice(p+termo.length)]; }
          return (
            <div key={i} style={{padding:isQ?"10px 0 2px 0":isR?"2px 0 10px 16px":"3px 0",fontSize:isTit?"15px":"13px",fontWeight:isQ||isTit?"bold":"normal",color:isTit?COR.gold:isQ?COR.accent:isR?"#c8dce8":"#a8c0cc",background:match?`${COR.gold}15`:"transparent",borderRadius:match?"4px":"0",paddingLeft:isR?"16px":"0",lineHeight:"1.7",borderBottom:isR?`1px solid ${COR.brd}30`:"none"}}>
              {match && partes.length>0 ? <>{partes[0]}<mark style={{background:`${COR.gold}60`,color:"#000",borderRadius:"2px",padding:"0 2px"}}>{partes[1]}</mark>{partes[2]}</> : (linha||" ")}
            </div>
          );
        })}
      </div>
    </Wrap>
  );
}

      ) : (
        RESUMO_COMPLETO.map((bloco,i) => (
          <div key={i} style={{background:"#0d1a2e",border:`1px solid ${COR.brd}`,borderLeft:`4px solid ${bloco.cor}`,borderRadius:"8px",padding:"12px",marginBottom:"10px"}}>
            <div style={{fontSize:"13px",fontWeight:"bold",color:COR.gold,marginBottom:"8px",borderBottom:`1px solid ${COR.brd}`,paddingBottom:"5px"}}>📌 {bloco.titulo}</div>
            {bloco.itens.map((item,j) => (
              <div key={j} style={{padding:"4px 0 4px 8px",fontSize:"12px",color:item.includes("⚠️")?"#ffaaaa":"#c8dce8",borderBottom:j<bloco.itens.length-1?`1px solid ${COR.brd}20`:"none"}}>
                {item.includes("⚠️") ? item : `• ${item}`}
              </div>
            ))}
          </div>
        ))
      )}
    </Wrap>
  );
}

// ─── TÓPICO ───────────────────────────────────────────────────────────────────
function Topico({topic, savedQuiz, onBack, onBackQuiz}) {
  if (!topic) return null;
  const MBox = ({tipo, titulo, texto}) => {
    const cores = {
      mnemo: {bg:"#0a1020", bd:COR.accent+"40", tc:COR.accent},
      dica:  {bg:"#0d1a0d", bd:COR.green+"40",  tc:COR.green},
      peg:   {bg:"#1a0808", bd:COR.red+"50",    tc:"#ff9999"}
    };
    const c = cores[tipo] || cores.dica;
    return (
      <div style={{background:c.bg,border:`1px solid ${c.bd}`,borderRadius:"8px",padding:"12px",marginBottom:"8px"}}>
        <div style={{fontSize:"12px",fontWeight:"bold",color:c.tc,marginBottom:"4px"}}>{titulo}</div>
        <div style={{fontSize:"12px",color:"#e8c8cc",lineHeight:"1.6",whiteSpace:"pre-line"}}>{texto}</div>
      </div>
    );
  };
  const mnemos = (topic.mnemonicos||[]).filter(m=>m.tipo==="mnemo");
  const dicas  = (topic.mnemonicos||[]).filter(m=>m.tipo==="dica");
  const pegs   = (topic.mnemonicos||[]).filter(m=>m.tipo==="peg");
  return (
    <Wrap>
      <div style={{display:"flex",gap:"8px",marginBottom:"12px",flexWrap:"wrap"}}>
        <button style={sBtnS} onClick={onBack}>← Início</button>
        {savedQuiz && <button style={{...sBtnS,borderColor:COR.orange,color:COR.orange}} onClick={onBackQuiz}>↩ Continuar Exercício</button>}
      </div>
      <div style={{fontSize:"18px",color:COR.gold,fontWeight:"bold",marginBottom:"12px",borderLeft:`4px solid ${COR.gold}`,paddingLeft:"10px"}}>{topic.icon} {topic.title}</div>
      {topic.subtopics.map((s,i)=>(
        <div key={i} style={{background:"#0d1a2e",border:`1px solid ${COR.brd}`,borderRadius:"8px",padding:"12px",marginBottom:"8px"}}>
          <div style={{fontSize:"13px",fontWeight:"bold",color:COR.accent,marginBottom:"5px"}}>{s.title}</div>
          <div style={{fontSize:"12px",color:"#c8dce8",lineHeight:"1.7",whiteSpace:"pre-line"}}>{s.text}</div>
        </div>
      ))}
      {mnemos.length>0&&<><div style={{fontSize:"14px",color:COR.accent,fontWeight:"bold",marginTop:"16px",marginBottom:"4px",borderLeft:`3px solid ${COR.accent}`,paddingLeft:"8px"}}>🧠 Mnemônicos</div>{mnemos.map((m,i)=><MBox key={i} tipo={m.tipo} titulo={m.titulo} texto={m.texto}/>)}</>}
      {dicas.length>0&&<><div style={{fontSize:"14px",color:COR.green,fontWeight:"bold",marginTop:"12px",marginBottom:"4px",borderLeft:`3px solid ${COR.green}`,paddingLeft:"8px"}}>📝 Dicas de Fixação</div>{dicas.map((m,i)=><MBox key={i} tipo={m.tipo} titulo={m.titulo} texto={m.texto}/>)}</>}
      {pegs.length>0&&<><div style={{fontSize:"14px",color:COR.red,fontWeight:"bold",marginTop:"12px",marginBottom:"4px",borderLeft:`3px solid ${COR.red}`,paddingLeft:"8px"}}>⚠️ Pegadinhas</div>{pegs.map((m,i)=><MBox key={i} tipo={m.tipo} titulo={m.titulo} texto={m.texto}/>)}</>}
    </Wrap>
  );
}

// ─── HOME ─────────────────────────────────────────────────────────────────────
function Home({goContent, startQuiz, exercRef}) {
  return (
    <Wrap>
      <div style={{fontSize:"18px",color:COR.gold,fontWeight:"bold",marginBottom:"12px",borderLeft:`4px solid ${COR.gold}`,paddingLeft:"10px"}}>📖 Ferramentas de Estudo</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(145px,1fr))",gap:"10px",marginBottom:"20px"}}>
        {[
          {icon:"⚡",label:"Super Resumo",  sub:"Pontos-chave",        v:"resumo-super"},
          {icon:"📋",label:"Resumo Completo",sub:"Todos os tópicos",   v:"resumo-completo"},
          {icon:"🧠",label:"Mapa Mental",   sub:"Visualize a matéria", v:"mapa"},
          {icon:"🃏",label:"Flashcards",    sub:"30 cartões",          v:"flashcards"},
          {icon:"📄",label:"PDF Original",  sub:"Com busca de palavras",v:"pdf"}
        ].map((item,i)=>(
          <div key={i} style={{background:COR.card,border:`1px solid ${COR.gold}40`,borderRadius:"8px",padding:"14px",cursor:"pointer",borderLeft:`4px solid ${COR.gold}`,textAlign:"center"}} onClick={()=>startQuiz(item.v)}>
            <div style={{fontSize:"24px",marginBottom:"4px"}}>{item.icon}</div>
            <div style={{fontSize:"12px",fontWeight:"bold",color:"#e8f4f8"}}>{item.label}</div>
            <div style={{fontSize:"10px",color:"#7fb3c8",marginTop:"2px"}}>{item.sub}</div>
          </div>
        ))}
      </div>
      <div style={{fontSize:"18px",color:COR.gold,fontWeight:"bold",marginBottom:"12px",borderLeft:`4px solid ${COR.gold}`,paddingLeft:"10px"}}>📚 Conteúdo + Mnemônicos</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(210px,1fr))",gap:"10px",marginBottom:"20px"}}>
        {TOPICS.map(t=>(
          <div key={t.id} style={{background:COR.card,border:`1px solid ${t.color}40`,borderRadius:"8px",padding:"14px",cursor:"pointer",borderLeft:`4px solid ${t.color}`}} onClick={()=>goContent(t)}>
            <div style={{fontSize:"22px",marginBottom:"4px"}}>{t.icon}</div>
            <div style={{fontSize:"13px",fontWeight:"bold",color:"#e8f4f8"}}>{t.title}</div>
            <div style={{fontSize:"10px",color:"#7fb3c8",marginTop:"2px"}}>{t.subtopics.length} subtópicos · 🧠 · ⚠️ →</div>
          </div>
        ))}
      </div>
      <div style={{fontSize:"18px",color:COR.gold,fontWeight:"bold",marginBottom:"12px",borderLeft:`4px solid ${COR.gold}`,paddingLeft:"10px"}} ref={exercRef}>🎯 Exercícios</div>
      <div style={{background:`linear-gradient(135deg,${COR.gold}15,${COR.orange}10)`,border:`2px solid ${COR.gold}`,borderRadius:"10px",padding:"16px",marginBottom:"14px",cursor:"pointer"}} onClick={()=>startQuiz("qpadrao")}>
        <div style={{display:"flex",alignItems:"center",gap:"12px"}}>
          <div style={{fontSize:"30px"}}>📄</div>
          <div style={{flex:1}}>
            <div style={{fontSize:"15px",fontWeight:"bold",color:COR.gold}}>Questões Padrão do Questionário</div>
            <div style={{fontSize:"11px",color:"#c8a820",marginTop:"3px"}}>22 questões idênticas ao PDF oficial</div>
            <div style={{fontSize:"10px",color:"#7fb3c8",marginTop:"4px"}}>Com gabarito + dicas de memorização</div>
          </div>
          <div style={{color:COR.gold,fontSize:"20px"}}>→</div>
        </div>
      </div>
      <div style={{fontSize:"12px",color:"#7fb3c8",marginBottom:"8px"}}>Outros tipos de exercícios:</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(155px,1fr))",gap:"10px"}}>
        {[
          {id:"multiple",     label:"Múltipla Escolha", icon:"🔘", n:MULTI_DATA.length},
          {id:"truefalse",    label:"Certo ou Errado",  icon:"✅", n:TF_DATA.length},
          {id:"complete",     label:"Complete",          icon:"✏️", n:COMPLETE_DATA.length},
          {id:"definitions",  label:"Definições",        icon:"📖", n:DEF_DATA.length},
          {id:"correlations", label:"Correlacione",      icon:"🔗", n:CORR_BASE.length+" conj."},
          {id:"cite",         label:"Cite / Liste",      icon:"📋", n:CITE_DATA.length}
        ].map(qt=>(
          <div key={qt.id} style={{background:COR.card,border:`1px solid ${COR.accent}40`,borderRadius:"8px",padding:"14px",cursor:"pointer",borderLeft:`4px solid ${COR.accent}`,textAlign:"center"}} onClick={()=>startQuiz(qt.id)}>
            <div style={{fontSize:"22px",marginBottom:"4px"}}>{qt.icon}</div>
            <div style={{fontSize:"11px",fontWeight:"bold",color:"#e8f4f8"}}>{qt.label}</div>
            <div style={{fontSize:"10px",color:"#7fb3c8",marginTop:"2px"}}>{qt.n} questões</div>
          </div>
        ))}
      </div>
    </Wrap>
  );
}

// ─── APP PRINCIPAL ────────────────────────────────────────────────────────────
// CORREÇÃO DEFINITIVA: um único estado `screen` substitui view + quizType.
// Antes: setQType(type); setView("quiz") → 2 setState separados → render intermediário
//        com view="quiz" e quizType=null → MultiplaEscolha desmonta e remonta com pos=0.
// Agora: setScreen("quiz-multiple") → 1 setState → render único, sem remount espúrio.
function App() {
  const [screen, setScreen]   = useState("home");
  const [topic, setTopic]     = useState(null);
  const [savedQuiz, setSaved] = useState(null);
  const [mapaExp, setMapaExp] = useState(null);
  const [pdfSearch, setPDF]   = useState("");
  const exercRef = useRef(null);

  const nb = (ativo, cor) => ({
    background: ativo ? (cor||COR.accent) : "transparent",
    color: ativo ? (cor ? "#fff" : "#000") : "#7fb3c8",
    border: `1px solid ${ativo ? (cor||COR.accent) : COR.brd}`,
    padding:"5px 10px", borderRadius:"4px", cursor:"pointer",
    fontSize:"10px", fontWeight: ativo ? "bold" : "normal"
  });

  const goContent = (t) => {
    // Salva a tela atual se estiver em algum quiz
    if (screen.startsWith("quiz-") || screen === "qpadrao") setSaved(screen);
    setTopic(t); setScreen("topic");
  };

  const backToQuiz = () => {
    if (!savedQuiz) return;
    setScreen(savedQuiz);
    setSaved(null);
  };

  const startQuiz = (type) => {
    // Tipos que já têm nome direto de tela
    const telas = ["resumo-super","resumo-completo","mapa","flashcards","pdf","qpadrao"];
    if (telas.includes(type)) { setPDF(""); setScreen(type); return; }
    // Exercícios viram "quiz-tipo" — atualização ÚNICA e ATÔMICA
    setScreen("quiz-" + type);
  };

  const scrollExerc = () => {
    setScreen("home");
    setTimeout(() => { exercRef.current?.scrollIntoView({behavior:"smooth"}); }, 150);
  };

  const eQuiz = screen.startsWith("quiz-");

  return (
    <div style={{minHeight:"100vh",background:COR.bg,color:"#e8f4f8",fontFamily:"Georgia,serif"}}>
      {/* Cabeçalho */}
      <div style={{background:"linear-gradient(135deg,#0a1628,#0d2137,#0a1628)",borderBottom:`2px solid ${COR.brd}`,padding:"14px 18px",display:"flex",alignItems:"center",gap:"12px"}}>
        <div style={{fontSize:"26px"}}>⚓</div>
        <div>
          <div style={{fontSize:"17px",fontWeight:"bold",color:COR.accent,letterSpacing:"2px",textTransform:"uppercase"}}>Gestão 2026 — Marinha do Brasil</div>
          <div style={{fontSize:"10px",color:"#7fb3c8"}}>Baseado no Questionário Oficial de Gestão 2026</div>
        </div>
      </div>

      {/* Navbar */}
      <div style={{display:"flex",gap:"5px",padding:"8px 12px",borderBottom:`1px solid ${COR.brd}`,background:"#0d1a2e",flexWrap:"wrap"}}>
        <button style={nb(screen==="home")}                    onClick={()=>setScreen("home")}>🏠</button>
        <button style={nb(screen==="resumo-super")}            onClick={()=>startQuiz("resumo-super")}>⚡ Resumo</button>
        <button style={nb(screen==="resumo-completo")}         onClick={()=>startQuiz("resumo-completo")}>📋 Completo</button>
        <button style={nb(screen==="mapa")}                    onClick={()=>setScreen("mapa")}>🧠 Mapa</button>
        <button style={nb(screen==="flashcards",COR.purple)}   onClick={()=>setScreen("flashcards")}>🃏 Flashcards</button>
        <button style={nb(screen==="pdf")}                     onClick={()=>{setPDF("");setScreen("pdf");}}>📄 PDF</button>
        {TOPICS.map(t=>(
          <button key={t.id} style={nb(screen==="topic"&&topic?.id===t.id)} onClick={()=>goContent(t)}>
            {t.icon} {t.title.split("—")[0].trim()}
          </button>
        ))}
        <button style={nb(screen==="qpadrao",COR.gold)}  onClick={()=>setScreen("qpadrao")}>📄 Q.Padrão</button>
        <button style={nb(eQuiz,COR.accent)}              onClick={scrollExerc}>🎯 Exercícios</button>
        {savedQuiz && !eQuiz && screen !== "qpadrao" && (
          <button style={{...nb(false),borderColor:COR.orange,color:COR.orange}} onClick={backToQuiz}>↩ Voltar</button>
        )}
      </div>

      {/* Conteúdo — cada condição tem apenas UMA variável de estado */}
      {screen==="home"              && <Home goContent={goContent} startQuiz={startQuiz} exercRef={exercRef}/>}
      {screen==="topic"             && <Topico topic={topic} savedQuiz={savedQuiz} onBack={()=>setScreen("home")} onBackQuiz={backToQuiz}/>}
      {screen==="resumo-super"      && <Resumo modo="super"/>}
      {screen==="resumo-completo"   && <Resumo modo="completo"/>}
      {screen==="mapa"              && <MapaMental exp={mapaExp} setExp={setMapaExp}/>}
      {screen==="flashcards"        && <Flashcards key="fc"/>}
      {screen==="pdf"               && <PDFViewer search={pdfSearch} onSearch={setPDF}/>}
      {screen==="qpadrao"           && <QPadrao key="qp"/>}
      {screen==="quiz-multiple"     && <MultiplaEscolha key="mul"/>}
      {screen==="quiz-truefalse"    && <CertoErrado     key="tf"/>}
      {screen==="quiz-complete"     && <Complete        key="co"/>}
      {screen==="quiz-definitions"  && <Definicoes      key="df"/>}
      {screen==="quiz-correlations" && <Correlacione    key="cr"/>}
      {screen==="quiz-cite"         && <Cite            key="ci"/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
